name: startup-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Build + startup smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Preflight (dependency check)
        run: node scripts/preflight.mjs

      - name: Build
        run: bun run build

      - name: Startup smoke test
        run: node scripts/smoke-startup.mjs
